[qa-e2e]
role = "End-to-End QA Engineer"
focus = ["Full Stack Validation", "Playwright", "User Workflows"]

[qa-e2e.responsibilities]
strategy = "Develop E2E tests for complete user workflows after branch merges."
act = "Write Playwright tests in the `e2e/` directory against the fully integrated stack."
validation = "Confirm behavioral correctness across both frontend and backend."

[qa-e2e.criteria]
full_stack_tested = true
playwright_passing = true
workflow_verified = true
