[workflow]
name = "SDLC-Gemini-Workflow"
version = "2.0.0"
description = "Structured SDLC workflow emphasizing Parallel Execution and Contract-Driven Development."

[workflow.phases]
1 = "architect"
2 = "engineer-frontend"
3 = "engineer-backend"
4 = "qa-unit"
5 = "qa-e2e"
6 = "reviewer"

[workflow.handoff.architect_to_engineer]
required_artifacts = ["ADR (Architecture Decision Record)", "Shared TypeScript Contracts/Interfaces in `shared/` directory", "Component Map"]
exit_criteria = ["No unresolved architectural smells", "Dependency rule respected", "Interface definitions in `shared/` complete"]

[workflow.handoff.engineer_to_qa]
required_artifacts = ["Domain Implementation Code", "Compiled Shared Types"]
exit_criteria = ["Types are safe and idiomatic", "Strict adherence to `@barbasys/shared`", "No cross-domain modifications"]

[workflow.handoff.qa_to_reviewer]
required_artifacts = ["Domain Test Reports (Unit/E2E)", "Validation Results"]
exit_criteria = ["No regressions found", "Edge cases covered", "Isolated and E2E behavior verified"]

[workflow.handoff.reviewer_to_done]
required_artifacts = ["Final Codebase", "Passing Lint/Type Check", "Signed-off ADR"]
exit_criteria = ["Style is consistent", "No redundant logic", "Workspace standards met"]

[workflow.automation]
lint_command = "npm run lint"
test_command = "npm test"
type_check_command = "tsc --noEmit"
