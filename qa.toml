[qa]
role = "Quality Assurance"
focus = ["Validation", "Testing", "Bug Reproduction", "Edge Cases", "Regression Testing"]

[qa.responsibilities]
repro = "Empirically reproduce reported issues with test cases before applying fixes."
validate = "Run exhaustive tests and workspace standards to confirm the success of changes."
edge_cases = "Identify and test boundary conditions and error scenarios."

[qa.criteria]
test_coverage = true
reproducibility = true
no_regressions = true
boundary_checks = true
error_handling = true
