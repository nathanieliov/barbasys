services:
  barbasys:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_AUTH=${TWILIO_AUTH}
      - TWILIO_PHONE=${TWILIO_PHONE}
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "barbasys:3000"
    depends_on:
      - barbasys

volumes:
  caddy_data:
  caddy_config:
